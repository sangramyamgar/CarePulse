version: 2

sources:
  - name: carepulse
    schema: public
    description: "Raw healthcare data loaded by the Python ETL pipeline."
    tables:
      - name: patients
        description: "Patient demographics"
        columns:
          - name: id
            tests: [unique, not_null]
          - name: birth_date
            tests: [not_null]
          - name: gender
            tests:
              - not_null
              - accepted_values:
                  values: ['M', 'F']

      - name: encounters
        description: "Patient visits / admissions"
        columns:
          - name: id
            tests: [unique, not_null]
          - name: patient_id
            tests: [not_null]
          - name: encounter_class
            tests:
              - not_null
              - accepted_values:
                  values: ['inpatient', 'outpatient', 'emergency', 'ambulatory', 'wellness', 'urgentcare']
          - name: start_date
            tests: [not_null]

      - name: organizations
        description: "Hospitals and facilities"
        columns:
          - name: id
            tests: [unique, not_null]
          - name: name
            tests: [not_null]

      - name: providers
        description: "Clinicians and care providers"
        columns:
          - name: id
            tests: [unique, not_null]

      - name: conditions
        description: "Diagnoses linked to encounters"

      - name: procedures
        description: "Procedures performed during encounters"

      - name: medications
        description: "Medications prescribed during encounters"
